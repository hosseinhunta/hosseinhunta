      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="20" fill="url(#glow1)"/>
